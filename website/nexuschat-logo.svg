<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c74ff"/>
      <stop offset="100%" style="stop-color:#5a52d5"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>

  <!-- Outer chat bubble -->
  <path d="M38 58 Q38 38 58 38 H142 Q162 38 162 58 V118 Q162 138 142 138 H112 L90 162 L90 138 H58 Q38 138 38 118 Z"
        fill="url(#bubble)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>

  <!-- Nexus nodes — three dots connected by lines -->
  <!-- Centre node -->
  <circle cx="100" cy="90" r="11" fill="#fff" opacity="0.95"/>
  <!-- Top-left node -->
  <circle cx="66" cy="68" r="7.5" fill="#fff" opacity="0.7"/>
  <!-- Top-right node -->
  <circle cx="134" cy="68" r="7.5" fill="#fff" opacity="0.7"/>
  <!-- Bottom-left node -->
  <circle cx="72" cy="116" r="7.5" fill="#fff" opacity="0.7"/>
  <!-- Bottom-right node -->
  <circle cx="128" cy="116" r="7.5" fill="#fff" opacity="0.7"/>

  <!-- Connecting lines centre ↔ satellites -->
  <line x1="100" y1="90" x2="66" y2="68"  stroke="#fff" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="100" y1="90" x2="134" y2="68" stroke="#fff" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="100" y1="90" x2="72" y2="116" stroke="#fff" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="100" y1="90" x2="128" y2="116" stroke="#fff" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="100" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700"
        fill="#ffffff" opacity="0.88" text-anchor="middle" letter-spacing="2">NEXUSCHAT</text>
</svg>
